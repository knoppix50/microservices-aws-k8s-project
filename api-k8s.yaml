apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-analytics
  template:
    metadata:
      labels:
        app: api-analytics
    spec:
      containers:
      - name: analytics-app
        image: api-flask:latest      # Tu imagen de la API de Python
        imagePullPolicy: Never
        ports:
        - containerPort: 5153        # Puerto por defecto del script del profesor
        env:
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          value: "password123"
        - name: DB_HOST
          value: "db-postgres"       # Apunta al servicio DNS de K8s creado arriba
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "postgres"
        - name: APP_PORT
          value: "5153"
        # --- LAS SONDAS DE KUBERNETES USANDO LAS RUTAS DEL PROFESOR ---
        livenessProbe:
          httpGet:
            path: /health_check      # Verifica si Flask sigue vivo
            port: 5153
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness_check   # Espera a que los scripts SQL terminen de cargar
            port: 5153
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-analytics-service
spec:
  type: NodePort                     # Expone la API hacia afuera de Minikube
  ports:
  - port: 5153
    targetPort: 5153
    nodePort: 30005                  # Puerto en tu localhost para probar la API
  selector:
    app: api-analytics

