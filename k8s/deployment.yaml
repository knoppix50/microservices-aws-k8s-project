apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-analytics-service
  labels:
    app: api-analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-analytics-service
  template:
    metadata:
      labels:
        app: api-analytics-service
    spec:
      containers:
      - name: analytics-api
        image: api-analytics-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5153
        # Database data connection
        env:
        - name: DB_HOST
          value: "postgres-db-postgresql.default.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "postgres"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-db-postgresql
              key: postgres-password
---
apiVersion: v1
kind: Service
metadata:
  name: api-analytics-service
spec:
  type: NodePort
  ports:
  - port: 5153        # Service port
    targetPort: 5153  # Container port
    nodePort: 30005   # External port
  selector:
    app: api-analytics-service

